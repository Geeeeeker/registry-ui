name: Build & Release Multi-Platform

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Tag (e.g., v1.0.0)'
        required: true
        type: string
      architectures:
        description: 'Target Architectures'
        required: true
        default: 'arm64,amd64'
        type: choice
        options:
          - arm64,amd64
          - arm,arm64,amd64
          - arm,arm64,i386,amd64
          - arm64
          - amd64
      draft:
        description: 'Create as Draft Release?'
        required: false
        default: false
        type: boolean

jobs:
  # ================== 并行编译 ==================
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
          - goos: linux
            goarch: 386
          # Windows
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: windows
            goarch: 386
          # macOS
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      # 判断当前架构是否在用户选择的列表中
      - name: Check if architecture is selected
        id: check_arch
        run: |
          SELECTED="${{ github.event.inputs.architectures }}"
          ARCH="${{ matrix.goarch }}"
          if echo "$SELECTED" | grep -qw "$ARCH"; then
            echo "selected=true" >> $GITHUB_OUTPUT
          else
            echo "selected=false" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        if: steps.check_arch.outputs.selected == 'true'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BIN_NAME="registry-ui-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN_NAME="$BIN_NAME.exe"
          fi
          go build -ldflags="-s -w" -o "$BIN_NAME" .
          echo "BIN_NAME=$BIN_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        if: steps.check_arch.outputs.selected == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}
          path: ${{ env.BIN_NAME }}
          if-no-files-found: error

  # ================== 发布 Release ==================
  release:
    name: Create Release & Upload Binaries
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          draft: ${{ github.event.inputs.draft }}
          files: artifacts/**/*
          fail_on_unmatched_files: true
