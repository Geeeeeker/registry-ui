name: Build & Release Multi-Platform

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Tag (e.g., v1.0.0)'
        required: true
        type: string
      architectures:
        description: 'Target Architectures'
        required: true
        default: 'arm64,amd64'
        type: choice
        options:
          - arm64,amd64
          - arm,arm64,amd64
          - arm,arm64,i386,amd64
          - arm64
          - amd64
      draft:
        description: 'Create as Draft Release?'
        required: false
        default: false
        type: boolean

jobs:
  # ================== 并行编译并打包 ==================
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
          - goos: linux
            goarch: 386
          # Windows
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: windows
            goarch: 386
          # macOS
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      # 判断当前架构是否在用户选择的列表中
      - name: Check if architecture is selected
        id: check_arch
        run: |
          SELECTED="${{ github.event.inputs.architectures }}"
          ARCH="${{ matrix.goarch }}"
          if echo "$SELECTED" | grep -qw "$ARCH"; then
            echo "selected=true" >> $GITHUB_OUTPUT
          else
            echo "selected=false" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        if: steps.check_arch.outputs.selected == 'true'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BIN_NAME="registry-ui"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN_NAME="$BIN_NAME.exe"
          fi
          go build -ldflags="-s -w" -o "$BIN_NAME" .
          echo "BIN_NAME=$BIN_NAME" >> $GITHUB_ENV

      # 打包：将二进制文件、templates/、static/ 打包为一个压缩包
      - name: Package artifacts
        if: steps.check_arch.outputs.selected == 'true'
        run: |
          # 创建临时目录
          PACKAGE_DIR="registry-ui-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "$PACKAGE_DIR"
          # 复制二进制文件
          cp "${{ env.BIN_NAME }}" "$PACKAGE_DIR/"
          # 复制资源目录（如果存在）
          if [ -d "templates" ]; then
            cp -r templates "$PACKAGE_DIR/"
          fi
          if [ -d "static" ]; then
            cp -r static "$PACKAGE_DIR/"
          fi
          # 根据平台选择打包格式
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "$PACKAGE_DIR.zip" "$PACKAGE_DIR"
            echo "PACKAGE_NAME=$PACKAGE_DIR.zip" >> $GITHUB_ENV
          else
            tar -czf "$PACKAGE_DIR.tar.gz" "$PACKAGE_DIR"
            echo "PACKAGE_NAME=$PACKAGE_DIR.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload artifact
        if: steps.check_arch.outputs.selected == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: ${{ env.PACKAGE_NAME }}
          if-no-files-found: error

  # ================== 发布 Release ==================
  release:
    name: Create Release & Upload Binaries
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          draft: ${{ github.event.inputs.draft }}
          files: artifacts/**/*
          fail_on_unmatched_files: true
