name: Build Multi-Platform Binaries

on:
  push:
    tags:
      - 'v*'               # 推送 tag 时触发，如 v1.0.0
  workflow_dispatch:       # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 定义目标平台和架构的组合
        include:
          # Linux
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: linux
            goarch: 386
            ext: ''
          # Windows
          - goos: windows
            goarch: amd64
            ext: '.exe'
          - goos: windows
            goarch: arm64
            ext: '.exe'
          - goos: windows
            goarch: 386
            ext: '.exe'
          # macOS (darwin)
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'   # 项目要求 Go 1.23+

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0        # 禁用 CGO，生成静态链接的二进制，兼容性更好
        run: |
          BIN_NAME="registry-ui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "$BIN_NAME" .
          echo "BIN_NAME=$BIN_NAME" >> $GITHUB_ENV

      - name: Upload artifact (保留为工作流产物)
        uses: actions/upload-artifact@v4
        with:
          name: registry-ui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.BIN_NAME }}

      # 可选：如果希望推送到 Release，取消下面的注释
      # - name: Upload to Release
      #   uses: softprops/action-gh-release@v1
      #   if: startsWith(github.ref, 'refs/tags/')
      #   with:
      #     files: ${{ env.BIN_NAME }}
